name: Build and Push Docker Image

on:
  push:
    branches: [main]

env:
  REGISTRY_URL: us-west1-docker.pkg.dev/lucibot-493305/lucibot

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        id: auth
        with:
          token_format: access_token
          workload_identity_provider: projects/707541527522/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-lucibot@lucibot-493305.iam.gserviceaccount.com

      - uses: docker/login-action@v3
        with:
          registry: us-west1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push
        run: |
          docker build -t ${{ env.REGISTRY_URL }}/lucibot:latest ./bot
          docker push ${{ env.REGISTRY_URL }}/lucibot:latest
